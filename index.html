<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>24 奇怪星球 · 封面產生器</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪐</text></svg>" />
  <link rel="stylesheet" href="css/style.css?v=7" />
</head>
<body>
  <header class="app-header">
    <h1>24 奇怪星球 · 封面產生器</h1>
    <p class="subtitle">上傳照片 → 打標題 → 下載封面（1080×1920）</p>
  </header>

  <main class="app-main">

    <!-- 接續上次設計橫幅 -->
    <div class="resume-bar hidden" id="resumeBar">
      <span class="resume-text">偵測到上次的設計，要接續嗎？</span>
      <span class="resume-actions">
        <button class="btn-mini" id="resumeYes" type="button">接續編輯</button>
        <button class="btn-mini ghost" id="resumeNo" type="button">從頭開始</button>
      </span>
    </div>

    <!-- 畫布區 -->
    <div class="stage">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="coverCanvas"></canvas>
        <!-- 安全區參考線（只在編輯時顯示，不會匯出） -->
        <div class="safe-overlay" id="safeOverlay" aria-hidden="true"></div>
      </div>
      <p class="hint" id="hint">先上傳一張封面照片開始 👇</p>
      <p class="gray-warn hidden" id="grayWarn">⚠️ 有露出灰底！請拖曳或放大照片把畫面蓋滿</p>
    </div>

    <!-- 控制列 -->
    <div class="controls">
      <label class="btn btn-primary">
        📷 上傳封面照片
        <input type="file" id="photoInput" accept="image/*" hidden />
      </label>

      <button class="btn btn-secondary" id="subjectBtn" type="button">✨ 主體蓋住標題（自動去背）</button>
      <p class="rec subject-tip">把封面主體自動去背、疊到標題前面，做出「標題被主體擋住」的效果。首次使用需下載 AI 模型（會頓一下，之後變快）；對人像最準、玩偶/雜物可能邊緣不完美。</p>

      <div class="field">
        <label for="photoZoom">封面照片縮放：<span id="photoZoomVal">100%</span> <span class="rec">（放大可重新取景、不露灰底）</span></label>
        <input type="range" id="photoZoom" min="100" max="300" step="1" value="100" />
      </div>

      <div class="field">
        <label for="titleInput">標題（一行最多 6 字・可換行）</label>
        <textarea id="titleInput" rows="2" placeholder="輸入封面標題…"></textarea>
      </div>

      <div class="field">
        <label for="fontSize">標題字級：<span id="fontSizeVal">220</span> <span class="rec">（品牌建議 220）</span></label>
        <input type="range" id="fontSize" min="80" max="320" step="2" value="220" />
      </div>

      <div class="field">
        <label for="subInput">副標題（選填・白字手繪黑底標籤・最多 8 字）</label>
        <textarea id="subInput" rows="1" maxlength="8" placeholder="例如：奇怪的巨鵝 / 結果叫醒我的是"></textarea>
      </div>

      <div class="field">
        <label for="subSize">副標字級：<span id="subSizeVal">150</span> <span class="rec">（品牌建議 150・不超過標題）</span></label>
        <input type="range" id="subSize" min="48" max="320" step="2" value="150" />
      </div>

      <div class="field">
        <label for="noteInput">說明標籤（選填・品牌黃手繪小貼紙）</label>
        <textarea id="noteInput" rows="1" maxlength="8" placeholder="例如：ep1 / ep2 / 吃好飽"></textarea>
      </div>

      <div class="field">
        <label for="noteSize">說明標籤字級：<span id="noteSizeVal">90</span> <span class="rec">（品牌建議 90）</span></label>
        <input type="range" id="noteSize" min="40" max="200" step="2" value="90" />
      </div>

      <label class="btn btn-secondary">
        🎨 上傳插畫（選填）
        <input type="file" id="illustInput" accept="image/*" hidden />
      </label>

      <div class="field-row">
        <label class="toggle">
          <input type="checkbox" id="safeToggle" checked />
          顯示安全區參考線
        </label>
        <button class="btn-link" id="deleteBtn" title="刪除選取的元素">🗑 刪除選取</button>
      </div>

      <button class="btn btn-secondary" id="cloudBtn" type="button">☁️ 雲端設計（登入後跨裝置）</button>

      <div class="field-row project-row">
        <button class="btn btn-secondary half" id="saveProjectBtn" type="button">💾 儲存設計檔</button>
        <label class="btn btn-secondary half">
          📂 開啟設計檔
          <input type="file" id="loadProjectInput" accept=".json,application/json" hidden />
        </label>
      </div>

      <button class="btn btn-download" id="downloadBtn">⬇️ 下載 PNG</button>
    </div>
  </main>

  <!-- 儲存彈窗（手機用：長按圖片儲存，按返回回到編輯） -->
  <div class="save-overlay hidden" id="saveOverlay">
    <div class="save-bar">
      <span class="save-tip">長按下方圖片 →「加入照片 / 儲存影像」</span>
      <button class="save-close" id="saveClose">← 返回編輯</button>
    </div>
    <div class="save-img-wrap">
      <img id="saveImg" alt="封面圖片，長按儲存" />
    </div>
  </div>

  <!-- 雲端設計面板 -->
  <div class="cloud-overlay hidden" id="cloudOverlay">
    <div class="cloud-card">
      <div class="cloud-head">
        <span>☁️ 雲端設計</span>
        <button class="cloud-close" id="cloudClose" type="button">✕</button>
      </div>
      <div class="cloud-body" id="cloudBody"></div>
    </div>
  </div>

  <script src="vendor/fabric.min.js"></script>
  <script src="js/app.js?v=7"></script>
</body>
</html>
